# Server Configuration
server.port=8081

# Application Configuration
spring.application.name=phishguard-backend

# Python ML Script Configuration
python.script.path=../python ml/phishing_detector_fixed.py
python.executable=python3

# Logging Configuration
logging.level.com.phishguard=INFO
logging.level.org.springframework.web=INFO

# CORS Configuration
cors.allowed-origins=http://localhost:5173

# Database - Choose H2 (default in-memory) or MySQL
# H2 (embedded, for dev):
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop

# MySQL (uncomment and configure for prod):
# spring.datasource.url=jdbc:mysql://localhost:3306/phishguard?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
# spring.datasource.username=your_username
# spring.datasource.password=your_secure_password
# spring.jpa.hibernate.dll-auto=update

# Copy this to application.properties and customize your values!
# NEVER commit real credentials.

