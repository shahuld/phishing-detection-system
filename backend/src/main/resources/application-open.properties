# Open access config - NO SECURITY
server.port=8081
spring.application.name=phishguard-backend
python.script.path=../python ml/phishing_detector.py
python.executable=python3
logging.level.com.phishguard=INFO
logging.level.org.springframework.web=INFO

# NO spring.security.user.name/password

# Database (H2 for no setup)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
server.port=8082
